# Docker Compose - DEV
version: '3.8'
services:
  app:
    image: cloudpanda/portal:dev
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PASSWORD=***REDACTED***
      - API_KEY=***API_KEY_REDACTED***
      - APP_ENV=production
      - APP_DEBUG=true

  database:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=***REDACTED***
      - POSTGRES_DB=cloudpanda_dev

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: redis-server --requirepass ***REDACTED***
