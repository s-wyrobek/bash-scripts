# Nginx Configuration - Development
worker_processes auto;
error_log /var/log/nginx/error.log debug;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name dev.cloudpanda.local;

        # Backend proxy
        location /api {
            proxy_pass http://${DB_HOST}:3000;
            proxy_set_header X-Api-Key ***API_KEY_REDACTED***;
        }

        # Static files
        location / {
            root /var/www/cloudpanda/dev;
            index index.html;
        }

        # Debug endpoint - REMOVE IN PROD
        location /debug {
            return 200 "Debug mode active - password: ***REDACTED***";
        }
    }
}
